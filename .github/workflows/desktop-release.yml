name: Desktop Release

on:
  push:
    tags:
      - "desktop/v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 1.3.0）"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  actions: read

env:
  CARGO_TERM_COLOR: always
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    name: ${{ matrix.platform }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            platform: windows
          - os: macos-14
            target: aarch64-apple-darwin
            platform: darwin
          - os: macos-13
            target: x86_64-apple-darwin
            platform: darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Validate release secrets
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORG_ID: ${{ secrets.SIGNPATH_ORG_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          missing=()
          for secret in TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD; do
            if [ -z "${!secret}" ]; then missing+=("$secret"); fi
          done
          if [ "${{ matrix.platform }}" = "darwin" ]; then
            for secret in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_KEYCHAIN_PASSWORD APPLE_ID APPLE_ID_PASSWORD APPLE_TEAM_ID APPLE_SIGNING_IDENTITY; do
              if [ -z "${!secret}" ]; then missing+=("$secret"); fi
            done
          fi
          if [ "${{ matrix.platform }}" = "windows" ]; then
            for secret in SIGNPATH_API_TOKEN SIGNPATH_ORG_ID; do
              if [ -z "${!secret}" ]; then missing+=("$secret"); fi
            done
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required release secrets for %s/%s:\n' "${{ matrix.platform }}" "${{ matrix.target }}"
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: Install dependencies
        run: bun install

      - name: Build sidecar
        run: bun --cwd packages/desktop run predev -- --target ${{ matrix.target }}

      - name: macOS Import Certificate
        if: matrix.platform == 'darwin'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$APPLE_KEYCHAIN_PASSWORD" build.keychain

      - name: Build Tauri App
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: bun --cwd packages/desktop run tauri -- build --target ${{ matrix.target }} --config tauri.prod.conf.json

      - name: Upload unsigned Windows installer
        if: matrix.platform == 'windows'
        id: upload_unsigned_windows
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-railwise-desktop-windows
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Sign Windows Installer (SignPath)
        if: matrix.platform == 'windows'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: railwise-desktop
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload_unsigned_windows.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist/signed

      - name: Upload signed Windows installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: railwise-desktop-${{ matrix.target }}-signed
          path: dist/signed/*.exe
          if-no-files-found: error

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: railwise-desktop-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle
            src-tauri/target/release/bundle
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create draft release
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/desktop
          merge-multiple: true

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="desktop/v${VERSION}"
          fi
          mapfile -t files < <(find dist/desktop -type f \( \
            -name "*.dmg" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.exe" -o \
            -name "*.tar.gz" -o \
            -name "*.zip" \))
          gh release create "$TAG" \
            --title "RAILWISE Desktop ${TAG#desktop/}" \
            --notes "查看 CHANGELOG.md 了解更新内容" \
            --draft \
            "${files[@]}"
