name: Desktop Release

on:
  push:
    tags:
      - "desktop/v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 1.3.0）"
        required: true
        type: string
      publish:
        description: "公开发布为 GitHub prerelease（默认 false，先创建草稿供复核）"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  actions: read

env:
  CARGO_TERM_COLOR: always
  RAILWISE_DESKTOP_VERSION: ${{ inputs.version || '' }}
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    name: ${{ matrix.platform }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            platform: darwin
            bundles: app,dmg
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: darwin
            bundles: app,dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install

      - name: Build sidecar
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun ./scripts/prepare.ts

      - name: Detect optional signing secrets
        id: signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${{ matrix.platform }}" = "darwin" ] \
            && [ -n "$APPLE_CERTIFICATE" ] \
            && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] \
            && [ -n "$APPLE_SIGNING_IDENTITY" ] \
            && [ -n "$APPLE_ID" ] \
            && [ -n "$APPLE_PASSWORD" ] \
            && [ -n "$APPLE_TEAM_ID" ]; then
            echo "macos=true" >> "$GITHUB_OUTPUT"
            echo "mode=signed-notarized" >> "$GITHUB_OUTPUT"
          else
            echo "macos=false" >> "$GITHUB_OUTPUT"
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "updater=true" >> "$GITHUB_OUTPUT"
          else
            echo "updater=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require macOS signing secrets
        if: steps.signing.outputs.macos != 'true'
        shell: bash
        run: |
          echo "Public RAILWISE Desktop macOS releases require Developer ID signing and notarization secrets."
          echo "Set APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_ID_PASSWORD, and APPLE_TEAM_ID."
          exit 1

      - name: Prepare CI Tauri config
        shell: bash
        working-directory: .
        run: |
          bun run prepare:tauri
          echo "Desktop build mode: ${{ steps.signing.outputs.mode }}"
          echo "Updater artifacts: ${{ steps.signing.outputs.updater }}"

      - name: macOS Import Certificate
        if: matrix.platform == 'darwin' && steps.signing.outputs.macos == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/pkgbuild -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Build Tauri App
        timeout-minutes: 45
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        working-directory: .
        run: bun run tauri -- build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --config src-tauri/tauri.ci.conf.json

      - name: Verify macOS app bundle
        shell: bash
        working-directory: .
        run: bun run verify:macos -- --target ${{ matrix.target }}

      - name: Verify macOS DMG contents
        shell: bash
        working-directory: .
        run: bun run verify:dmg -- --target ${{ matrix.target }}

      - name: Stage bundle artifacts
        shell: bash
        working-directory: .
        run: bun run stage:macos:bundles -- --target ${{ matrix.target }} --require-updater

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: railwise-desktop-${{ matrix.target }}-${{ steps.signing.outputs.mode }}
          path: src-tauri/target/desktop-release/${{ matrix.target }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create GitHub release
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/desktop
          merge-multiple: false

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          PUBLISH_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="desktop/v${VERSION}"
          fi
          mapfile -t dmgs < <(find dist/desktop -type f -name "*.dmg" | sort -u)
          mapfile -t updates < <(find dist/desktop -type f \( -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \) | sort -u)
          if [ "${#dmgs[@]}" -ne 2 ]; then
            printf "Expected exactly 2 public macOS installers, found %s:\n" "${#dmgs[@]}"
            printf "%s\n" "${dmgs[@]}"
            exit 1
          fi
          if [ "${#updates[@]}" -ne 4 ]; then
            printf "Expected exactly 4 macOS updater artifacts, found %s:\n" "${#updates[@]}"
            printf "%s\n" "${updates[@]}"
            exit 1
          fi
          sha256sum "${dmgs[@]}" "${updates[@]}" > SHA256SUMS.txt
          if draft=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq ".isDraft" 2>/dev/null); then
            if [ "$draft" = "true" ]; then
              gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" -y
            else
              echo "Release $TAG already exists and is not a draft."
              exit 1
            fi
          fi
          release_flags=(--draft)
          if [[ "$TAG" == *"-beta"* ]] || [ "$PUBLISH_RELEASE" = "true" ]; then
            release_flags=(--prerelease)
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "RAILWISE Desktop ${TAG#desktop/}" \
            --notes "查看 CHANGELOG.md 了解更新内容" \
            "${release_flags[@]}" \
            --target "$GITHUB_SHA" \
            "${dmgs[@]}" \
            "${updates[@]}" \
            SHA256SUMS.txt
